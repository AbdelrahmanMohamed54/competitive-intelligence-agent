version: "3.9"

services:
  api:
    build: .
    container_name: cia-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - chroma_data:/app/.chroma
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: .
    container_name: cia-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Point Streamlit at the API container, not localhost
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped

volumes:
  chroma_data:
    driver: local
